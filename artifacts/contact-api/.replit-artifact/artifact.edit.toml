kind = "api"
previewPath = "/contact-api"
title = "Contact Form API (FastAPI)"
version = "1.0.0"
id = "contact-api-fastapi"

[[services]]
localPort = 8000
name = "Contact API"
paths = ["/contact-api"]

[services.development]
run = "uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
workdir = "artifacts/contact-api"

[services.production.run]
args = ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

[services.production.run.env]
PORT = "8000"
