version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI contact form backend ────────────────────────────────────────────
  contact-api:
    build:
      context: .
      dockerfile: Dockerfile.contact-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-appdb}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Express API server ──────────────────────────────────────────────────────
  api-server:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      PORT: 8080
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-appdb}
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-app}
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATABASE: ${POSTGRES_DB:-appdb}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-secret-in-production}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (Nginx + static Vite build) ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        PORT: 3000
        BASE_PATH: /
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - api-server
      - contact-api

volumes:
  postgres_data:
